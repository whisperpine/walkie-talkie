name: Build and deploy frontend

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: build wt-webapp and deploy on Cloudflare Pages
    environment:
      name: wt-webapp
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Build frontend app
        shell: nix shell nixpkgs#bun --quiet --command bash {0}
        run: |
          bun install --cwd wt-webapp
          bun run --cwd wt-webapp build
      - name: Deploy on Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES }}
        shell: nix shell nixpkgs#wrangler --quiet --command bash {0}
        run: |
          wrangler pages deploy ./wt-webapp/dist/ --project-name=walkie-talkie
